name: Update Daily Intensity
on:
  schedule:
    - cron: '20 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create intensity.json
        run: |
          INTENSITY="0.103"
          DATE=$(date +%Y-%m-%d)
          
          cat > intensity.json << EOF
          {
            "intensity": $INTENSITY,
            "date": "$DATE",
            "timestamp": $(date +%s)000,
            "updatedAt": "$(date)",
            "source": "farcaster"
          }
          EOF
          
          cat intensity.json
          
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add intensity.json
          git commit -m "Update daily intensity [skip ci]" || exit 0
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
