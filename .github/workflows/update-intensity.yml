name: Update Daily Intensity
on:
  schedule:
    - cron: '20 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create intensity.json
        run: |
          INTENSITY="0.103"
          DATE=$(date +%Y-%m-%d)
          TIMESTAMP=$(date +%s)000
          UPDATED_AT=$(date)
          
          # Use printf to ensure proper number formatting
          printf '{\n' > intensity.json
          printf '  "intensity": 0.103,\n' >> intensity.json
          printf '  "date": "%s",\n' "$DATE" >> intensity.json
          printf '  "timestamp": %s,\n' "$TIMESTAMP" >> intensity.json
          printf '  "updatedAt": "%s",\n' "$UPDATED_AT" >> intensity.json
          printf '  "source": "farcaster"\n' >> intensity.json
          printf '}\n' >> intensity.json
          
          echo "Created intensity.json:"
          cat intensity.json
          
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add intensity.json
          git diff --staged --quiet || git commit -m "Update daily intensity [skip ci]"
          git push origin main
