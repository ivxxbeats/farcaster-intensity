name: Update Intensity
on:
  schedule:
    - cron: '20 22 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Update intensity.json
        run: |
          # Set intensity (change this value to whatever you want)
          INTENSITY=0.69
          
          echo "{\"intensity\": $INTENSITY, \"date\": \"$(date +%Y-%m-%d)\", \"timestamp\": $(date +%s)000, \"source\": \"workflow\"}" > intensity.json
          
          cat intensity.json
          
      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update intensity
          file_pattern: intensity.json
