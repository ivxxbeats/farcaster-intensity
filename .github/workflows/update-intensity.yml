name: Update Intensity

on:
  workflow_dispatch:  # Manual trigger only - for testing
  schedule:
    - cron: '20 22 * * *'  # Daily at 22:20 UTC

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create test intensity
        run: |
          echo '{"intensity": 0.75, "date": "'$(date +%Y-%m-%d)'"}' > intensity.json
          cat intensity.json
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add intensity.json
          git commit -m "Update intensity [skip ci]" || echo "No changes"
          git push origin main
