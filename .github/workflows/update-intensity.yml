name: Update Daily Intensity
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create intensity file
        run: |
          # Simple intensity calculation (0.103 for testing)
          INTENSITY="0.103"
          DATE=$(date +%Y-%m-%d)
          TIMESTAMP=$(date +%s)000
          
          echo "{
  \"intensity\": $INTENSITY,
  \"date\": \"$DATE\",
  \"timestamp\": $TIMESTAMP,
  \"updatedAt\": \"$(date)\",
  \"source\": \"test\"
}" > intensity.json
          
          cat intensity.json
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add intensity.json
          git commit -m "Update intensity" || echo "No changes"
          git push
