name: Update Daily Intensity
on:
  schedule:
    - cron: '20 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Fetch and calculate intensity
        env:
          NEYNAR_API_KEY: ${{ secrets.NEYNAR_API_KEY }}
        run: |
          echo "đź“ˇ Fetching Farcaster data..."
          
          RESPONSE=$(curl -s "https://api.neynar.com/v2/farcaster/feed/trending?limit=10&time_window=24h" \
            -H "accept: application/json" \
            -H "x-api-key: $NEYNAR_API_KEY")
          
          CAST_COUNT=$(echo "$RESPONSE" | grep -o '"hash"' | wc -l)
          LIKE_SUM=$(echo "$RESPONSE" | grep -o '"likes_count":[0-9]*' | grep -o '[0-9]*' | awk '{sum+=$1} END {print sum}')
          RECAST_SUM=$(echo "$RESPONSE" | grep -o '"recasts_count":[0-9]*' | grep -o '[0-9]*' | awk '{sum+=$1} END {print sum}')
          
          LIKE_SUM=${LIKE_SUM:-0}
          RECAST_SUM=${RECAST_SUM:-0}
          
          echo "đź“Š Casts: $CAST_COUNT"
          echo "âť¤ď¸Ź Likes: $LIKE_SUM"
          echo "đź”„ Recasts: $RECAST_SUM"
          
          # ============================================================
          # LOWER INTENSITY FORMULA - MAX INTENSITY 0.35
          # ============================================================
          
          # Cast volume scores (reduced by 50%)
          if [ $CAST_COUNT -ge 10 ]; then CAST_SCORE=0.04
          elif [ $CAST_COUNT -ge 7 ]; then CAST_SCORE=0.03
          elif [ $CAST_COUNT -ge 4 ]; then CAST_SCORE=0.02
          elif [ $CAST_COUNT -ge 1 ]; then CAST_SCORE=0.01
          else CAST_SCORE=0.005; fi
          
          # Like volume scores (reduced by 50%)
          if [ $LIKE_SUM -ge 1000 ]; then LIKE_SCORE=0.04
          elif [ $LIKE_SUM -ge 500 ]; then LIKE_SCORE=0.03
          elif [ $LIKE_SUM -ge 200 ]; then LIKE_SCORE=0.02
          elif [ $LIKE_SUM -ge 50 ]; then LIKE_SCORE=0.01
          else LIKE_SCORE=0.005; fi
          
          # Recast volume scores (reduced by 50%)
          if [ $RECAST_SUM -ge 200 ]; then RECAST_SCORE=0.02
          elif [ $RECAST_SUM -ge 100 ]; then RECAST_SCORE=0.015
          elif [ $RECAST_SUM -ge 50 ]; then RECAST_SCORE=0.01
          elif [ $RECAST_SUM -ge 10 ]; then RECAST_SCORE=0.005
          else RECAST_SCORE=0.002; fi
          
          RAW_SCORE=$(echo "scale=3; $CAST_SCORE + $LIKE_SCORE + $RECAST_SCORE" | bc)
          
          # Map to range: 0.05 to 0.35 (much lower ceiling)
          INTENSITY=$(echo "scale=3; 0.05 + $RAW_SCORE * 0.30" | bc)
          
          # Ensure leading zero
          INTENSITY=$(echo $INTENSITY | awk '{printf "%.3f", $0}')
          
          echo "đźŽ¨ Final intensity: $INTENSITY"
          
          # Write JSON
          DATE=$(date +%Y-%m-%d)
          TIMESTAMP=$(date +%s)000
          
          cat > intensity.json << EOF
{
  "intensity": $INTENSITY,
  "date": "$DATE",
  "timestamp": $TIMESTAMP,
  "updatedAt": "$(date)",
  "source": "farcaster"
}
EOF
          
          echo "âś… intensity.json created:"
          cat intensity.json
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config.user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add intensity.json
          git diff --cached --quiet || git commit -m "Update daily intensity [skip ci]"
          git push origin main
