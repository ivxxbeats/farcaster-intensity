name: Update Daily Intensity
on:
  schedule:
    - cron: '20 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Create intensity file
        run: |
          INTENSITY="0.103"
          DATE=$(date +%Y-%m-%d)
          TIMESTAMP=$(date +%s)000
          
          echo "{
  \"intensity\": $INTENSITY,
  \"date\": \"$DATE\",
  \"timestamp\": $TIMESTAMP,
  \"updatedAt\": \"$(date)\",
  \"source\": \"farcaster\"
}" > intensity.json
          
          cat intensity.json
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add intensity.json
          git commit -m "Update daily intensity [skip ci]" || echo "No changes"
          git push origin main
