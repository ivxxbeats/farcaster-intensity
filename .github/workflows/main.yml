name: Update Daily Intensity
on:
  schedule:
    - cron: '20 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Fetch Farcaster activity
        env:
          NEYNAR_API_KEY: ${{ secrets.NEYNAR_API_KEY }}
        run: |
          echo "🔑 Testing API key..."
          
          # Try trending feed endpoint (confirmed working)
          echo "📡 Fetching trending feed..."
          RESPONSE=$(curl -s -w "\n%{http_code}" "https://api.neynar.com/v2/farcaster/feed/trending?limit=10&time_window=24h" \
            -H "accept: application/json" \
            -H "x-api-key: $NEYNAR_API_KEY" 2>&1)
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "HTTP Status: $HTTP_CODE"
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ API call successful!"
            
            # Count trending casts as activity metric
            CAST_COUNT=$(echo "$BODY" | grep -o '"hash"' | wc -l)
            echo "📊 Trending casts count: $CAST_COUNT"
            
            # Calculate intensity based on trending activity (0-100 scale)
            if [ $CAST_COUNT -gt 50 ]; then
              INTENSITY=0.95
            elif [ $CAST_COUNT -gt 30 ]; then
              INTENSITY=0.80
            elif [ $CAST_COUNT -gt 15 ]; then
              INTENSITY=0.65
            elif [ $CAST_COUNT -gt 5 ]; then
              INTENSITY=0.45
            else
              INTENSITY=0.25
            fi
          else
            echo "⚠️ API returned $HTTP_CODE, using time-based fallback"
            DAY=$(date +%d)
            INTENSITY=$(echo "scale=3; 0.05 + ($DAY / 31) * 0.90" | bc)
          fi
          
          # Apply 30% sensitivity boost
          INTENSITY=$(echo "scale=3; 0.05 + ($INTENSITY - 0.05) * 1.3" | bc)
          if (( $(echo "$INTENSITY > 0.95" | bc -l) )); then INTENSITY=0.95; fi
          
          echo "🎨 Final intensity: $INTENSITY"
          
          cat > intensity.json << EOF
          {
            "intensity": $INTENSITY,
            "date": "$(date +%Y-%m-%d)",
            "timestamp": $(date +%s)000,
            "updatedAt": "$(date)",
            "source": "trending-feed"
          }
          EOF
          
          cat intensity.json
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add intensity.json
          if git diff --staged --quiet; then
            echo "📝 No changes to commit"
          else
            git commit -m "Update daily intensity [skip ci]"
            git pull --rebase origin main
            git push
            echo "✅ Pushed changes"
          fi
