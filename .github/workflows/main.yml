name: Update Daily Intensity
on:
  schedule:
    - cron: '20 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Fetch Farcaster data
        run: |
          echo "📡 Fetching Farcaster data from public Hub API..."
          
          # Use public Farcaster Hub API (no API key needed)
          RESPONSE=$(curl -s "https://hub.farcaster.com/v1/castsByFid?fid=1&pageSize=100" 2>&1)
          
          if [ $? -eq 0 ] && [ -n "$RESPONSE" ]; then
            # Count casts as activity metric
            CAST_COUNT=$(echo "$RESPONSE" | grep -o '"hash"' | wc -l)
            echo "📊 Recent casts from fid=1: $CAST_COUNT"
            
            # Use cast count as intensity metric (0-100 range)
            if [ $CAST_COUNT -gt 80 ]; then
              INTENSITY=0.95
            elif [ $CAST_COUNT -gt 60 ]; then
              INTENSITY=0.75
            elif [ $CAST_COUNT -gt 40 ]; then
              INTENSITY=0.55
            elif [ $CAST_COUNT -gt 20 ]; then
              INTENSITY=0.35
            else
              INTENSITY=0.20
            fi
            
            echo "🎨 Intensity based on activity: $INTENSITY"
          else
            echo "⚠️ Hub API failed, using time-based intensity"
            DAY=$(date +%d)
            DAY=$((10#$DAY))
            INTENSITY=$(echo "scale=3; 0.05 + ($DAY / 31) * 0.90" | bc)
            echo "📅 Time-based intensity: $INTENSITY"
          fi
          
          cat > intensity.json << EOF
          {
            "intensity": $INTENSITY,
            "date": "$(date +%Y-%m-%d)",
            "timestamp": $(date +%s)000,
            "updatedAt": "$(date)",
            "source": "farcaster-hub"
          }
          EOF
          
          echo "✅ intensity.json created"
          cat intensity.json
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add intensity.json
          if git diff --staged --quiet; then
            echo "📝 No changes to commit"
          else
            git commit -m "Update daily intensity [skip ci]"
            git pull --rebase origin main
            git push
            echo "✅ Pushed changes"
          fi
