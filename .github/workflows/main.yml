name: Update Daily Intensity
on:
  schedule:
    - cron: '20 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Fetch Farcaster trending feed
        env:
          NEYNAR_API_KEY: ${{ secrets.NEYNAR_API_KEY }}
        run: |
          echo "📡 Fetching Farcaster trending feed..."
          
          # Correct parameters: limit=10 (max), time_window=24h
          RESPONSE=$(curl -s "https://api.neynar.com/v2/farcaster/feed/trending?limit=10&time_window=24h" \
            -H "accept: application/json" \
            -H "x-api-key: $NEYNAR_API_KEY")
          
          HTTP_CODE=$?
          
          if [ $HTTP_CODE -eq 0 ] && [ -n "$RESPONSE" ] && [ "$RESPONSE" != "{}" ]; then
            echo "✅ API call successful!"
            
            # Count casts in response
            CAST_COUNT=$(echo "$RESPONSE" | grep -o '"hash"' | wc -l)
            echo "📊 Trending casts (last 24h): $CAST_COUNT"
            
            # Extract engagement metrics
            LIKE_SUM=0
            RECAST_SUM=0
            
            for i in $(seq 1 $CAST_COUNT); do
              LIKE=$(echo "$RESPONSE" | grep -o '"likes_count":[0-9]*' | head -$i | tail -1 | grep -o '[0-9]*')
              RECAST=$(echo "$RESPONSE" | grep -o '"recasts_count":[0-9]*' | head -$i | tail -1 | grep -o '[0-9]*')
              LIKE_SUM=$((LIKE_SUM + ${LIKE:-0}))
              RECAST_SUM=$((RECAST_SUM + ${RECAST:-0}))
            done
            
            TOTAL_REACTIONS=$((LIKE_SUM + RECAST_SUM))
            
            if [ $CAST_COUNT -gt 0 ]; then
              ENGAGEMENT=$(echo "scale=2; $TOTAL_REACTIONS / $CAST_COUNT" | bc)
            else
              ENGAGEMENT=1.0
            fi
            
            echo "❤️ Total likes: $LIKE_SUM"
            echo "🔄 Total recasts: $RECAST_SUM"
            echo "📈 Engagement per cast: $ENGAGEMENT"
            
            # Calculate intensity (0.05 - 0.95)
            # Base on cast volume (0-10 casts scale)
            if [ $CAST_COUNT -gt 8 ]; then
              VOLUME_SCORE=0.50
            elif [ $CAST_COUNT -gt 5 ]; then
              VOLUME_SCORE=0.35
            elif [ $CAST_COUNT -gt 2 ]; then
              VOLUME_SCORE=0.20
            else
              VOLUME_SCORE=0.10
            fi
            
            # Engagement score (0-3.5 scale)
            if (( $(echo "$ENGAGEMENT > 3.0" | bc -l) )); then
              ENGAGE_SCORE=0.50
            elif (( $(echo "$ENGAGEMENT > 2.0" | bc -l) )); then
              ENGAGE_SCORE=0.35
            elif (( $(echo "$ENGAGEMENT > 1.0" | bc -l) )); then
              ENGAGE_SCORE=0.20
            else
              ENGAGE_SCORE=0.10
            fi
            
            # Combined score (50% volume, 50% engagement)
            RAW_SCORE=$(echo "scale=3; ($VOLUME_SCORE + $ENGAGE_SCORE) / 2" | bc)
            
            # Map to 0.05-0.95 range
            INTENSITY=$(echo "scale=3; 0.05 + $RAW_SCORE * 0.90" | bc)
            
            echo "🎨 Final intensity: $INTENSITY"
            
          else
            echo "⚠️ API returned error, using time-based fallback"
            DAY=$(date +%d)
            DAY=$((10#$DAY))
            INTENSITY=$(echo "scale=3; 0.05 + ($DAY / 31) * 0.90" | bc)
            echo "📅 Fallback intensity: $INTENSITY"
          fi
          
          cat > intensity.json << EOF
          {
            "intensity": $INTENSITY,
            "date": "$(date +%Y-%m-%d)",
            "timestamp": $(date +%s)000,
            "updatedAt": "$(date)",
            "source": "neynar-trending"
          }
          EOF
          
          echo "✅ intensity.json created:"
          cat intensity.json
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add intensity.json
          if git diff --staged --quiet; then
            echo "📝 No changes to commit"
          else
            git commit -m "Update daily intensity [skip ci]"
            git pull --rebase origin main
            git push
            echo "✅ Pushed changes"
          fi
