name: Update Daily Intensity
on:
  schedule:
    - cron: '20 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Fetch and update intensity
        env:
          NEYNAR_API_KEY: ${{ secrets.NEYNAR_API_KEY }}
        run: |
          echo "🔑 Checking API key..."
          if [ -z "$NEYNAR_API_KEY" ]; then
            echo "❌ ERROR: NEYNAR_API_KEY secret not set!"
            exit 1
          fi
          echo "✅ API key found"
          
          echo "📡 Fetching Farcaster stats..."
          
          RESPONSE=$(curl -s -w "\n%{http_code}" "https://api.neynar.com/v2/farcaster/stats" \
            -H "x-api-key: $NEYNAR_API_KEY" 2>&1)
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "HTTP Status: $HTTP_CODE"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "⚠️ API returned $HTTP_CODE, using fallback intensity"
            INTENSITY=0.50
          else
            echo "✅ API call successful"
            CASTS=$(echo "$BODY" | grep -o '"cast_count_24h":[0-9]*' | grep -o '[0-9]*')
            USERS=$(echo "$BODY" | grep -o '"active_users_24h":[0-9]*' | grep -o '[0-9]*')
            
            CASTS=${CASTS:-50000}
            USERS=${USERS:-40000}
            
            if [ $CASTS -gt 350000 ]; then
              INTENSITY=0.95
            else
              INTENSITY=$(echo "scale=3; 0.05 + ($CASTS / 350000) * 0.90" | bc)
            fi
            echo "📊 Casts: $CASTS, Users: $USERS, Intensity: $INTENSITY"
          fi
          
          DATE=$(date +%Y-%m-%d)
          
          cat > intensity.json << EOF
          {
            "intensity": $INTENSITY,
            "date": "$DATE",
            "timestamp": $(date +%s)000,
            "updatedAt": "$(date)"
          }
          EOF
          
          echo "✅ intensity.json created"
          cat intensity.json
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add intensity.json
          if git diff --staged --quiet; then
            echo "📝 No changes to commit"
          else
            git commit -m "Update daily intensity [skip ci]"
            # Pull latest changes and rebase
            git pull --rebase origin main
            git push
            echo "✅ Pushed changes"
          fi
