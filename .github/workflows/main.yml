name: Update Daily Intensity
on:
  schedule:
    # Runs daily at 4:20 PM CST (22:20 UTC)
    # Note: During daylight saving, this will be 3:20 PM CST
    - cron: '20 22 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

# Add permissions to allow the action to push to the repository
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # Force Node.js 24 to avoid deprecation warnings
      - name: Force Node.js 24
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          # Fetch the entire history to allow commits
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # Use Node.js 22 (LTS) instead of 20

      - name: Create update script
        run: |
          cat > update-intensity.js << 'EOF'
          const fs = require('fs');

          // 30% LOWER THRESHOLDS (more sensitive)
          const THRESHOLDS = {
              CASTS_MAX: 350000,      // Was 500000 (30% reduction)
              USERS_MAX: 105000,      // Was 150000 (30% reduction)
              ENGAGEMENT_MAX: 3.5,    // Was 5.0 (30% reduction)
              GROWTH_MAX: 7000,       // Was 10000 (30% reduction)
              CASTS_MIN: 30000,
              USERS_MIN: 20000,
              ENGAGEMENT_MIN: 0.3,
              GROWTH_MIN: 300
          };

          const SENSITIVITY_MULTIPLIER = 1.3;  // 30% more sensitive

          function normalize(value, min, max) {
              let normalized = (value - min) / (max - min);
              normalized = Math.min(1, Math.max(0, normalized));
              // Exponential curve for faster early rise
              normalized = Math.pow(normalized, 0.6);
              return normalized;
          }

          function calculateIntensity(stats) {
              const castNorm = normalize(stats.cast_count_24h || 50000, THRESHOLDS.CASTS_MIN, THRESHOLDS.CASTS_MAX);
              const userNorm = normalize(stats.active_users_24h || 40000, THRESHOLDS.USERS_MIN, THRESHOLDS.USERS_MAX);

              let engagementPerCast = 1.5;
              if (stats.cast_count_24h > 0) {
                  engagementPerCast = ((stats.like_count_24h || 0) + (stats.recast_count_24h || 0)) / stats.cast_count_24h;
              }
              const engagementNorm = normalize(engagementPerCast, THRESHOLDS.ENGAGEMENT_MIN, THRESHOLDS.ENGAGEMENT_MAX);

              const growthNorm = normalize(stats.new_users_24h || 1000, THRESHOLDS.GROWTH_MIN, THRESHOLDS.GROWTH_MAX);

              // Weighted average
              let rawIntensity = (castNorm * 0.30) + (userNorm * 0.25) + (engagementNorm * 0.25) + (growthNorm * 0.20);

              // Apply sensitivity multiplier
              let intensity = 0.05 + (rawIntensity * 0.9);
              intensity = 0.05 + (intensity - 0.05) * SENSITIVITY_MULTIPLIER;

              return Math.max(0.05, Math.min(0.95, intensity));
          }

          async function updateIntensity() {
              const NEYNAR_API_KEY = process.env.NEYNAR_API_KEY;

              try {
                  console.log('Fetching Farcaster stats from Neynar API...');

                  const response = await fetch('https://api.neynar.com/v2/farcaster/stats', {
                      headers: { 'x-api-key': NEYNAR_API_KEY }
                  });

                  if (!response.ok) throw new Error(`API returned ${response.status}`);

                  const stats = await response.json();
                  console.log('Stats received');

                  const intensity = calculateIntensity(stats);

                  const output = {
                      intensity: intensity,
                      date: new Date().toISOString().split('T')[0],
                      timestamp: Date.now(),
                      updatedAt: new Date().toLocaleString('en-US', { timeZone: 'America/Chicago' }),
                      metrics: {
                          dailyCasts: stats.cast_count_24h,
                          activeUsers: stats.active_users_24h,
                          engagementPerCast: stats.cast_count_24h > 0 ?
                              ((stats.like_count_24h || 0) + (stats.recast_count_24h || 0)) / stats.cast_count_24h : 0,
                          newUsers: stats.new_users_24h
                      }
                  };

                  fs.writeFileSync('intensity.json', JSON.stringify(output, null, 2));
                  console.log(`✅ Intensity updated: ${intensity.toFixed(3)}`);

              } catch (error) {
                  console.error('Failed to fetch intensity:', error.message);

                  // Fallback to time-based intensity
                  const now = new Date();
                  const day = now.getUTCDate();
                  const dayIntensity = 0.1 + (day / 31) * 0.85;
                  const hour = now.getUTCHours();
                  const hourMod = Math.sin(hour * Math.PI / 12) * 0.05;
                  const fallbackIntensity = Math.max(0.05, Math.min(0.95, dayIntensity + hourMod));

                  const fallbackOutput = {
                      intensity: fallbackIntensity,
                      date: new Date().toISOString().split('T')[0],
                      timestamp: Date.now(),
                      source: 'fallback'
                  };

                  fs.writeFileSync('intensity.json', JSON.stringify(fallbackOutput, null, 2));
                  console.log(`⚠️ Using fallback intensity: ${fallbackIntensity.toFixed(3)}`);
              }
          }

          updateIntensity();
          EOF

      - name: Run intensity update
        run: node update-intensity.js
        env:
          NEYNAR_API_KEY: ${{ secrets.NEYNAR_API_KEY }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add intensity.json
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update daily intensity [skip ci]"
            git push
          fi
