name: Update Daily Intensity
on:
  schedule:
    - cron: '20 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Prevent merge conflicts by always fetching fresh
          ref: main
          
      - name: Fetch and calculate intensity
        env:
          NEYNAR_API_KEY: ${{ secrets.NEYNAR_API_KEY }}
        run: |
          echo "📡 Fetching Farcaster data..."
          
          RESPONSE=$(curl -s "https://api.neynar.com/v2/farcaster/feed/trending?limit=10&time_window=24h" \
            -H "accept: application/json" \
            -H "x-api-key: $NEYNAR_API_KEY")
          
          if [ -n "$RESPONSE" ] && [ "$RESPONSE" != "{}" ]; then
            CAST_COUNT=$(echo "$RESPONSE" | grep -o '"hash"' | wc -l)
            LIKE_SUM=$(echo "$RESPONSE" | grep -o '"likes_count":[0-9]*' | grep -o '[0-9]*' | awk '{sum+=$1} END {print sum}')
            RECAST_SUM=$(echo "$RESPONSE" | grep -o '"recasts_count":[0-9]*' | grep -o '[0-9]*' | awk '{sum+=$1} END {print sum}')
            
            LIKE_SUM=${LIKE_SUM:-0}
            RECAST_SUM=${RECAST_SUM:-0}
            
            echo "📊 Casts: $CAST_COUNT"
            echo "❤️ Likes: $LIKE_SUM"
            echo "🔄 Recasts: $RECAST_SUM"
            
            # ============================================================
            # NEW ULTRA-LOW FORMULA (max intensity 0.25)
            # ============================================================
            
            # Cast volume (max 0.08)
            if [ $CAST_COUNT -ge 10 ]; then
              CAST_SCORE=0.08
            elif [ $CAST_COUNT -ge 7 ]; then
              CAST_SCORE=0.06
            elif [ $CAST_COUNT -ge 4 ]; then
              CAST_SCORE=0.04
            elif [ $CAST_COUNT -ge 1 ]; then
              CAST_SCORE=0.02
            else
              CAST_SCORE=0.01
            fi
            
            # Like volume (max 0.08)
            if [ $LIKE_SUM -ge 1000 ]; then
              LIKE_SCORE=0.08
            elif [ $LIKE_SUM -ge 500 ]; then
              LIKE_SCORE=0.06
            elif [ $LIKE_SUM -ge 200 ]; then
              LIKE_SCORE=0.04
            elif [ $LIKE_SUM -ge 50 ]; then
              LIKE_SCORE=0.02
            else
              LIKE_SCORE=0.01
            fi
            
            # Recast volume (max 0.04)
            if [ $RECAST_SUM -ge 200 ]; then
              RECAST_SCORE=0.04
            elif [ $RECAST_SUM -ge 100 ]; then
              RECAST_SCORE=0.03
            elif [ $RECAST_SUM -ge 50 ]; then
              RECAST_SCORE=0.02
            elif [ $RECAST_SUM -ge 10 ]; then
              RECAST_SCORE=0.01
            else
              RECAST_SCORE=0.005
            fi
            
            # Total raw score (max 0.20)
            RAW_SCORE=$(echo "scale=3; $CAST_SCORE + $LIKE_SCORE + $RECAST_SCORE" | bc)
            
            # Map to intensity range: 0.08 to 0.25
            INTENSITY=$(echo "scale=3; 0.08 + $RAW_SCORE * 0.17" | bc)
            
            # ============================================================
            # APPLY RAMP-UP (0-15% over month)
            # ============================================================
            DAY=$(date +%d)
            DAY=$((10#$DAY))
            
            if [ $DAY -le 14 ]; then
              RAMP=$(echo "scale=3; 1 + ($DAY / 14) * 0.15" | bc)
            else
              RAMP=1.15
            fi
            
            INTENSITY=$(echo "scale=3; $INTENSITY * $RAMP" | bc)
            
            # Clamp to max 0.28
            if (( $(echo "$INTENSITY > 0.28" | bc -l) )); then INTENSITY=0.28; fi
            if (( $(echo "$INTENSITY < 0.08" | bc -l) )); then INTENSITY=0.08; fi
            
            echo "📅 Day $DAY (ramp: ${RAMP}x) → Intensity: $INTENSITY"
            
          else
            echo "⚠️ API failed, using time-based"
            DAY=$(date +%d)
            DAY=$((10#$DAY))
            INTENSITY=$(echo "scale=3; 0.08 + ($DAY / 31) * 0.20" | bc)
          fi
          
          # Write JSON (clean, no trailing spaces)
          printf '{
  "intensity": %.3f,
  "date": "%s",
  "timestamp": %d,
  "updatedAt": "%s",
  "source": "farcaster"
}\n' "$INTENSITY" "$(date +%Y-%m-%d)" "$(date +%s)000" "$(date)" > intensity.json
          
          echo ""
          echo "📄 Final intensity.json:"
          cat intensity.json
          
      - name: Commit and push (force overwrite)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Force add to overwrite any conflicts
          git add -f intensity.json
          
          # Commit if there are changes
          if git diff --cached --quiet; then
            echo "📝 No changes to commit"
          else
            git commit -m "Update daily intensity [skip ci]"
            # Force push to avoid rebase conflicts
            git push origin main --force-with-lease
            echo "✅ Pushed changes"
          fi
