name: Update Daily Intensity
on:
  schedule:
    - cron: '20 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Debug - Check environment
        run: |
          echo "=== Debug Info ==="
          echo "Node version: $(node --version)"
          echo "npm version: $(npm --version)"
          echo "curl version: $(curl --version | head -1)"
          echo "Current time: $(date)"
          echo "================="
          
      - name: Simple intensity update (no API)
        run: |
          echo "Creating intensity.json without API call..."
          
          # Simple time-based intensity (0.05 to 0.95 based on day of month)
          DAY=$(date +%d)
          INTENSITY=$(echo "scale=3; 0.05 + ($DAY / 31) * 0.90" | bc)
          
          echo "Day: $DAY, Intensity: $INTENSITY"
          
          cat > intensity.json << EOF
          {
            "intensity": $INTENSITY,
            "date": "$(date +%Y-%m-%d)",
            "timestamp": $(date +%s)000,
            "updatedAt": "$(date)",
            "source": "time-based"
          }
          EOF
          
          echo "✅ intensity.json created:"
          cat intensity.json
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add intensity.json
          if git diff --staged --quiet; then
            echo "📝 No changes to commit"
          else
            git commit -m "Update daily intensity [skip ci]"
            git pull --rebase origin main
            git push
            echo "✅ Pushed changes"
          fi
