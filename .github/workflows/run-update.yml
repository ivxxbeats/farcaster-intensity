name: Update Intensity
on:
  schedule:
    - cron: '20 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Fetch Farcaster data and calculate intensity
        env:
          NEYNAR_API_KEY: ${{ secrets.NEYNAR_API_KEY }}
        run: |
          echo "📡 Fetching Farcaster trending data..."
          
          RESPONSE=$(curl -s "https://api.neynar.com/v2/farcaster/feed/trending?limit=10&time_window=24h" \
            -H "accept: application/json" \
            -H "x-api-key: $NEYNAR_API_KEY")
          
          CAST_COUNT=$(echo "$RESPONSE" | grep -o '"hash"' | wc -l)
          LIKE_SUM=$(echo "$RESPONSE" | grep -o '"likes_count":[0-9]*' | grep -o '[0-9]*' | awk '{sum+=$1} END {print sum}')
          RECAST_SUM=$(echo "$RESPONSE" | grep -o '"recasts_count":[0-9]*' | grep -o '[0-9]*' | awk '{sum+=$1} END {print sum}')
          
          LIKE_SUM=${LIKE_SUM:-0}
          RECAST_SUM=${RECAST_SUM:-0}
          
          echo "📊 Trending casts: $CAST_COUNT"
          echo "❤️ Total likes: $LIKE_SUM"
          echo "🔄 Total recasts: $RECAST_SUM"
          
          # Calculate intensity scores
          if [ $CAST_COUNT -ge 10 ]; then CAST_SCORE=0.28
          elif [ $CAST_COUNT -ge 7 ]; then CAST_SCORE=0.22
          elif [ $CAST_COUNT -ge 4 ]; then CAST_SCORE=0.16
          elif [ $CAST_COUNT -ge 1 ]; then CAST_SCORE=0.10
          else CAST_SCORE=0.05; fi
          
          if [ $LIKE_SUM -ge 1000 ]; then LIKE_SCORE=0.28
          elif [ $LIKE_SUM -ge 500 ]; then LIKE_SCORE=0.22
          elif [ $LIKE_SUM -ge 200 ]; then LIKE_SCORE=0.16
          elif [ $LIKE_SUM -ge 50 ]; then LIKE_SCORE=0.10
          else LIKE_SCORE=0.05; fi
          
          if [ $RECAST_SUM -ge 200 ]; then RECAST_SCORE=0.24
          elif [ $RECAST_SUM -ge 100 ]; then RECAST_SCORE=0.19
          elif [ $RECAST_SUM -ge 50 ]; then RECAST_SCORE=0.14
          elif [ $RECAST_SUM -ge 10 ]; then RECAST_SCORE=0.08
          else RECAST_SCORE=0.04; fi
          
          RAW_SCORE=$(echo "scale=3; $CAST_SCORE + $LIKE_SCORE + $RECAST_SCORE" | bc)
          INTENSITY=$(echo "scale=3; 0.12 + $RAW_SCORE * 0.68" | bc)
          
          echo "🎨 Calculated intensity: $INTENSITY"
          
          # Use Python to write JSON with proper formatting
          python3 -c "
import json
import datetime

intensity = float($INTENSITY)
data = {
    'intensity': intensity,
    'date': '$(date +%Y-%m-%d)',
    'timestamp': $(date +%s)000,
    'updatedAt': '$(date)',
    'source': 'farcaster-80pct',
    'metrics': {
        'casts': $CAST_COUNT,
        'likes': $LIKE_SUM,
        'recasts': $RECAST_SUM
    }
}

with open('intensity.json', 'w') as f:
    json.dump(data, f, indent=2)
    f.write('\n')

print(f'✅ JSON written with intensity: {intensity:.3f}')
"
          
          echo ""
          echo "📄 Final intensity.json:"
          cat intensity.json
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add intensity.json
          git commit -m "Update intensity from Farcaster [skip ci]" || echo "No changes"
          git push
